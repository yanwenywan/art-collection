title: "神海人設 Caeleste Mare: Characters"
description: Sketches and full drawings of original characters from CM
cover: ./chars/moon-god-temple.jpg
images:
  - file: chars/an-ye-ref.jpg
    title: 星尊安夜 參考圖 The Star Venerable An Ye (Reference)
    description: Reference showcase of the Star Venerable An Ye, descendant of the "Night River" bloodline--the northern House of Xu 虛.
  - file: chars/yushen-ref.jpg
    title: 月尊 参考图 The Moon Venerable (Reference)
    description: Reference showcase of the Moon Venerable
  - file: chars/dongfang-tianjie-ref.jpg
    title: 東方天界 参考图 Dongfang Tianjie (Reference)
    description: Second son of the late Marquis of Jiangxia, a carefree young soul (gay in all the definitions), and an avid martial artist. He likes to show off and be the centre of attention, and is sometimes affectionally known as the "Flower of Tianjing".
  - file: chars/qin-of-yan.jpg
    title: 燕欽王 King Qin of Yan
    description: given name 燕昕 Yan Xin, first emperor of the Yan dragon dynasty, which began 16,000 years of draconic rule.
  - file: chars/moon-god-temple.jpg
    title: 月尊雨神 Moon Venerable; Rain God
    description: given name 玄海 Xuanhai, lesser deity of the moon, also controls the rains, harvest, and dispels evil.
  - file: chars/xingzun-temple.jpg
    title: 無上星尊 The Supreme Venerable of the Stars
    description: surname 安 An, given name 夜 Ye, lesser deity of the stars, second in the throne. She was born a mortal and ascended during the time of the human dynasty of Liao, and is the weakest of the lesser gods. The stars ordain fate, omens, and seasons, and is decidedly sinister in nature, despite An Ye herself being very kind in nature.
  - file: chars/yuan-mengwu.jpg
    title: 夢雲道人元夢吾 Mengyun Daoist Yuan Mengwu
    description: (Torrential Rains timeline) Yuan Mengwu, nascent soul elder of the 星府龍宮 House of Stars Dragon Palace, heart cultivator.
  - file: chars/golmak.png
    title: 死神 Golmak, former God of Death
    description: "he tried to usurp a god and was struck down, now a shadow lurking in the dark, his power locked away. (Artist commentary: wasnt actually too happy with this piece, but it's growing on me somehow)"
  - file: chars/ouyang-zhan.png
    title: 歐陽湛 Ouyang Zhan
    description: Qin master and leader of the Ouyang Sect, one of the strongest mages in the world. Eventually became a disciple of the Rain God, and ascended to immortality. Same generation as Star Venerable An Ye.

  - file: chars/zuojia.jpg
    title: 作家 The Writer
    description: An Ye and her Dao Companion 姜藝 Jiang Yi, the 梧桐真仙 Wutong Immortal. As the stars control fate, so can it write the future, this is the most sinister and powerful ability of that house.

  - file: chars/yinyufanfei.png
    title: 銀羽翻飛 Silver feathers flying
    description: Small drawing of the Moon Venerable writing calligraphy with Silver's wing feather quill.
  - file: chars/shai-canghai-sketch.png
    title: 月尊幼弟 given name 滄海, the younger of two brothers, who was banished to Qara Qai. Also known as the feathered god.
  - file: chars/an-ye-jiang-yi.png
    title: An Ye and Jiang Yi
  - file: chars/an-ye-chi-dao.png
    title: 安夜持刀 An Ye with Guandao
  - file: chars/guandao-po-tianjie.png
    title: Guandao
  - file: chars/an-ye-blep.png
    title: An Ye
  - file: chars/jingshui-sketch.png
    title: 井水不犯河水 Well water does not interfere with river water
    description: Gods of man do not interfere with Gods of dragons! Xuanhai fighting the gods of man, torrential rains timeline.
  - file: chars/hao.png
    title: Hi~
  - file: chars/zichen-hongye.png
    title: An Zichen and Dongfang Hongye
    description: fathers of An Ye and Dongfang Tianjie respectively.
  - file: chars/four-houses.png
    title: Four dragon houses of the stars
    description: The four dragon clans of the Ancient Star Venerable. An Ye belongs to the northern branch (虛 Xu)
  - file: chars/jiang-yi.jpg
    title: 姜藝 Jiang Yi (comic)
    description: Comic introducing the Wutong Daoist Jiang Yi.
  - file: chars/yijia.png
    title: 一家仙歌長 Happy Family
    description: An Ye, Jiang Yi, and Jiang Yi's crane-demon disciple 仙靈 Xianling.
  - file: chars/wenqin.png
    title: 聞琴 Listening to Qin
  - file: chars/zhenxiang.jpg
    title: 真相 True Form
    description: As a grown dragon and lesser deity, An Ye is actually quite large. Usually though, she shrinks her form to more conveniently move around in normal life.
  - file: chars/snarl.png
    title: An Ye Snarl
  - file: chars/jiang-yi-cat.jpg
    title: 姜藝親愛的大貓咪 Jiang Yi's beloved big cat
  - file: chars/reading.jpg
    title: Reading
  - file: chars/niannianyouyu.jpg
    title: 年年有餘 May your years be plenty
    description: 2026 Year of the Horse.
  - file: chars/identity-2-cn.png
    title: Identity
    description: Introduces 姜林 Jiang Lin, Jiang Yi's son, and 蘭之禮 Lan Zhili, from the Lan clan of Jingwu.
  - file: chars/dftj.png
    title: 少主東方 Young Lord Dongfang
    description: Dongfang Tianjie.
